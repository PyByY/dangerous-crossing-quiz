<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .login-box {
            background-color: white;
            border: 1px solid #dbdbdb;
            max-width: 350px;
            width: 100%;
            padding: 10px 0;
            margin-bottom: 10px;
        }

        .insta-wordmark {
            display: block;
            /* High-quality reliable wordmark PNG */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png');
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
            height: 51px;
            width: 175px;
            margin: 36px auto 12px;
        }

        .input-wrapper {
            position: relative;
            margin: 0 40px 6px;
            height: 38px;
        }

        .input-field {
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px 7px;
            font-size: 12px;
            width: 100%;
            height: 100%;
            outline: none;
            color: #262626;
            transition: border-color 0.1s ease;
        }

        .input-field:focus {
            border-color: #a8a8a8;
        }

        .show-pass-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 600;
            color: #262626;
            cursor: pointer;
            display: none;
        }

        .login-btn {
            background-color: #4cb5f9;
            color: white;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            padding: 7px 16px;
            width: calc(100% - 80px);
            margin: 8px 40px;
            cursor: default;
            border: none;
            transition: background-color 0.2s;
        }

        .login-btn.active {
            background-color: #0095f6;
            cursor: pointer;
        }

        .divider {
            display: flex;
            align-items: center;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            margin: 10px 40px 18px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider::before { margin-right: 18px; }
        .divider::after { margin-left: 18px; }

        .fb-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 20px;
            border: none;
            background: none;
            width: 100%;
        }

        .app-store-btn {
            height: 40px;
            margin: 0 4px;
            cursor: pointer;
        }

        footer {
            color: #8e8e8e;
            font-size: 12px;
            padding: 24px 20px 52px;
            text-align: center;
        }

        .footer-links div {
            margin-bottom: 12px;
        }

        .footer-links span {
            margin: 0 8px;
            cursor: pointer;
            display: inline-block;
        }

        .status-popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #262626;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <main class="flex-grow flex flex-col items-center justify-center w-full max-w-[350px] mt-8">
        <div class="login-box">
            <div class="insta-wordmark"></div>
            
            <form id="loginForm" class="mt-6 flex flex-col items-center">
                <div class="input-wrapper w-full">
                    <input type="text" id="username" placeholder="Phone number, username, or email" class="input-field" required autocomplete="off">
                </div>
                <div class="input-wrapper w-full">
                    <input type="password" id="password" placeholder="Password" class="input-field" autocomplete="off">
                    <button type="button" id="togglePassword" class="show-pass-btn">Show</button>
                </div>
                <button type="submit" id="loginBtn" class="login-btn" disabled>Log in</button>
            </form>

            <div class="divider">OR</div>

            <button class="fb-login">
                <!-- Inline SVG Facebook Icon for reliability -->
                <svg class="mr-2" width="16" height="16" viewBox="0 0 24 24" fill="#385185">
                    <path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/>
                </svg>
                Log in with Facebook
            </button>

            <div class="text-center mb-4">
                <a href="#" class="text-xs" style="color: #00376b;">Forgot password?</a>
            </div>
        </div>

        <div class="login-box text-center py-5">
            <p class="text-sm">Don't have an account? <span class="font-semibold" style="color: #0095f6; cursor: pointer;">Sign up</span></p>
        </div>

        <div class="mt-4 text-center">
            <p class="text-sm mb-4">Get the app.</p>
            <div class="flex justify-center">
                <!-- Official Download Badges -->
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yt/r/YzyTdfTZl_0.png" alt="Download on App Store" class="app-store-btn">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym_f00.png" alt="Get it on Google Play" class="app-store-btn">
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <div>
                <span>Meta</span><span>About</span><span>Blog</span><span>Jobs</span><span>Help</span><span>API</span><span>Privacy</span><span>Terms</span><span>Top Accounts</span><span>Locations</span><span>Instagram Lite</span><span>Contact Uploading & Non-Users</span><span>Meta Verified</span>
            </div>
            <div class="mt-4">
                <span>English</span> © 2024 Instagram from Meta
            </div>
        </div>
    </footer>

    <div id="statusPopup" class="status-popup"></div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const statusPopup = document.getElementById('statusPopup');
        const togglePassword = document.getElementById('togglePassword');

        // Show/Hide password toggle logic
        passwordInput.addEventListener('input', () => {
            togglePassword.style.display = passwordInput.value.length > 0 ? "block" : "none";
            validateInput();
        });

        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            togglePassword.innerText = isPassword ? "Hide" : "Show";
        });

        function validateInput() {
            if (usernameInput.value.length > 0) {
                loginBtn.disabled = false;
                loginBtn.classList.add('active');
            } else {
                loginBtn.disabled = true;
                loginBtn.classList.remove('active');
            }
        }

        usernameInput.addEventListener('input', validateInput);

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const originalText = loginBtn.innerText;
            loginBtn.innerText = "Logging in...";
            loginBtn.disabled = true;
            loginBtn.style.opacity = "0.7";
            
            setTimeout(() => {
                showPopup("Logged in: " + usernameInput.value);
                loginBtn.innerText = originalText;
                loginBtn.disabled = false;
                loginBtn.style.opacity = "1";
            }, 1500);
        });

        function showPopup(text) {
            statusPopup.innerText = text;
            statusPopup.style.display = "block";
            setTimeout(() => {
                statusPopup.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
